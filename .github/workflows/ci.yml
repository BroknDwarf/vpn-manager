name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: ShellCheck
        run: |
          find . -type f \( -name '*.sh' -o -path './bin/vpn' \) -print0 |
          xargs -0 shellcheck

      - name: Syntax tests
        run: bash tests/syntax.sh

      - name: Smoke tests
        run: bash tests/smoke.sh
